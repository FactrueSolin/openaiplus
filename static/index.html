<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGPT Plus Checkout</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: #f5f5f3;
        color: #181816;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 56px 20px;
      }
      section {
        background: #ffffff;
        border: 1px solid #deded8;
        border-radius: 18px;
        box-shadow: 0 18px 50px rgb(0 0 0 / 8%);
        padding: 28px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 6vw, 44px);
      }
      p {
        line-height: 1.7;
      }
      label {
        display: block;
        font-weight: 700;
        margin: 22px 0 8px;
      }
      textarea {
        width: 100%;
        min-height: 140px;
        box-sizing: border-box;
        border: 1px solid #cfcfca;
        border-radius: 12px;
        padding: 14px;
        font: inherit;
        resize: vertical;
      }
      button {
        margin-top: 16px;
        border: 0;
        border-radius: 999px;
        padding: 12px 20px;
        font: inherit;
        font-weight: 700;
        background: #111111;
        color: #ffffff;
        cursor: pointer;
      }
      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: #111111;
        color: #f7f7f7;
        border-radius: 12px;
        padding: 14px;
      }
      a {
        color: #0b57d0;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>ChatGPT Plus Checkout</h1>
        <p>粘贴 ChatGPT `/api/auth/session` 返回的 `accessToken`，后端会调用 ChatGPT checkout 接口并返回 Stripe hosted 长链接。</p>

        <label for="token">session_token / accessToken</label>
        <textarea id="token" autocomplete="off" spellcheck="false" placeholder="eyJhbGciOi..."></textarea>
        <button id="submit" type="button">生成 Checkout 链接</button>

        <h2>结果</h2>
        <pre id="result">等待提交。</pre>
      </section>
    </main>

    <script>
      const token = document.querySelector("#token");
      const result = document.querySelector("#result");
      const submit = document.querySelector("#submit");

      submit.addEventListener("click", async () => {
        submit.disabled = true;
        result.textContent = "正在请求 /api/checkout ...";

        try {
          const response = await fetch("/api/checkout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_token: token.value.trim() }),
          });
          const data = await response.json();

          if (!response.ok) {
            result.textContent = data.error || JSON.stringify(data, null, 2);
            return;
          }

          result.innerHTML = `<a href="${data.checkout_url}" target="_blank" rel="noreferrer">${data.checkout_url}</a>\n\n${JSON.stringify(data, null, 2)}`;
        } catch (error) {
          result.textContent = error.message;
        } finally {
          submit.disabled = false;
        }
      });
    </script>
  </body>
</html>
